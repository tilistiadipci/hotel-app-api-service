version: "3.8"

services:
    api:
        build: .
        ports:
            - "3000:3000"
        environment:
            DB_HOST: db
            DB_NAME: tvdb
            DB_USER: root
            DB_PASS: root
            JWT_SECRET: supersecret
        depends_on:
            - db

    db:
        image: mysql:8
        restart: always
        environment:
            MYSQL_DATABASE: tvdb
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"
